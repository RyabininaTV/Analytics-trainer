version: '3.8'

services:
  app:
    build: .
    container_name: analytics-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-localhost}:5432/${DB_NAME:-trainer}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - trainer-network

networks:
  trainer-network:
    driver: bridge
